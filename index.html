<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音录制器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .recorder {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .mic-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(233,69,96,0.4);
        }
        .mic-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(233,69,96,0.6);
        }
        .mic-icon.recording {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .mic-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }
        .status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ccc;
        }
        .status.recording {
            color: #e94560;
        }
        .timer {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            font-family: monospace;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .btn-record {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
        }
        .btn-record:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233,69,96,0.4);
        }
        .btn-stop {
            background: #444;
            color: white;
        }
        .btn-download {
            background: linear-gradient(135deg, #00d9ff 0%, #00a8cc 100%);
            color: white;
        }
        .btn-download:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-download:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,217,255,0.4);
        }
        .recordings-list {
            margin-top: 30px;
            text-align: left;
        }
        .recordings-list h3 {
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #aaa;
        }
        .recording-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .recording-item audio {
            flex: 1;
            margin-right: 10px;
        }
        .recording-item .delete-btn {
            background: transparent;
            color: #e94560;
            padding: 5px 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ 语音录制器</h1>
        <div class="recorder">
            <div class="mic-icon" id="micBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </div>
            <div class="status" id="status">点击麦克风开始录制</div>
            <div class="timer" id="timer">00:00</div>
            <div class="controls">
                <button class="btn-record" id="recordBtn">开始录制</button>
                <button class="btn-stop" id="stopBtn" disabled>停止</button>
                <button class="btn-download" id="downloadBtn" disabled>下载录音</button>
            </div>
            <div class="recordings-list" id="recordingsList"></div>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let startTime;
        let timerInterval;
        let currentAudioBlob;

        const micBtn = document.getElementById('micBtn');
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const status = document.getElementById('status');
        const timer = document.getElementById('timer');
        const recordingsList = document.getElementById('recordingsList');

        async function initRecorder() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = () => {
                    currentAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    downloadBtn.disabled = false;
                    addRecordingToList(currentAudioBlob);
                    audioChunks = [];
                };
            } catch (err) {
                status.textContent = '请允许麦克风权限';
                console.error(err);
            }
        }

        function startRecording() {
            if (!mediaRecorder) {
                initRecorder().then(() => startRecording());
                return;
            }
            mediaRecorder.start();
            isRecording = true;
            startTime = Date.now();
            
            status.textContent = '正在录制...';
            status.classList.add('recording');
            recordBtn.disabled = true;
            stopBtn.disabled = false;
            micBtn.classList.add('recording');
            
            timerInterval = setInterval(updateTimer, 100);
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            
            status.textContent = '录制完成';
            status.classList.remove('recording');
            recordBtn.disabled = false;
            stopBtn.disabled = true;
            micBtn.classList.remove('recording');
            
            clearInterval(timerInterval);
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            timer.textContent = `${minutes}:${seconds}`;
        }

        function downloadRecording() {
            if (!currentAudioBlob) return;
            
            const url = URL.createObjectURL(currentAudioBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `录音_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.webm`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function addRecordingToList(blob) {
            const url = URL.createObjectURL(blob);
            const item = document.createElement('div');
            item.className = 'recording-item';
            item.innerHTML = `
                <audio controls src="${url}"></audio>
                <button class="delete-btn" onclick="this.parentElement.remove()">删除</button>
            `;
            recordingsList.appendChild(item);
        }

        micBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        recordBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);
        downloadBtn.addEventListener('click', downloadRecording);

        // Initialize on load
        initRecorder();
    </script>
</body>
</html>
