<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>语音录制器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
        }
        
        .step {
            display: none;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        .step.active {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .step-icon {
            font-size: 4rem;
            margin-bottom: 30px;
        }
        .step-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .step-desc {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 40px;
        }
        
        .input-box {
            width: 100%;
            max-width: 300px;
        }
        .input-box input {
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: 16px;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.95);
            text-align: center;
            outline: none;
        }
        .input-box input:focus {
            box-shadow: 0 0 0 3px rgba(0,217,255,0.5);
        }
        
        .btn {
            padding: 18px 48px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d9ff 0%, #00a8cc 100%);
            color: white;
            box-shadow: 0 8px 30px rgba(0,217,255,0.4);
        }
        .btn-primary:active {
            transform: scale(0.95);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .recorder-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .user-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-name {
            background: rgba(0,217,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .btn-text {
            background: transparent;
            color: #ff6b6b;
            padding: 8px 16px;
            font-size: 0.9rem;
        }
        
        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(233,69,96,0.5);
            transition: all 0.3s ease;
            margin: 30px 0;
        }
        .mic-button:active {
            transform: scale(0.9);
        }
        .mic-button.recording {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 40px rgba(233,69,96,0.5); }
            50% { transform: scale(1.1); box-shadow: 0 15px 60px rgba(233,69,96,0.8); }
        }
        .mic-button svg {
            width: 50px;
            height: 50px;
            fill: white;
        }
        
        .timer {
            font-size: 3rem;
            font-weight: bold;
            font-family: 'SF Mono', monospace;
            margin: 20px 0;
        }
        
        .status-text {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
        }
        .status-text.recording {
            color: #e94560;
        }
        
        /* 当前录音段 */
        .current-session {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 320px;
        }
        .session-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .session-label {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }
        .segments-count {
            background: rgba(0,217,255,0.3);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
        }
        
        .record-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-record {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            box-shadow: 0 8px 30px rgba(233,69,96,0.4);
        }
        .btn-pause {
            background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
            color: white;
            box-shadow: 0 8px 30px rgba(255,152,0,0.4);
        }
        .btn-save {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            box-shadow: 0 8px 30px rgba(76,175,80,0.4);
        }
        .btn-save:disabled {
            opacity: 0.5;
            box-shadow: none;
        }
        
        /* 完成界面 */
        .complete-stats {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            width: 100%;
            max-width: 320px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 320px;
        }
        
        .btn-share {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            box-shadow: 0 8px 30px rgba(76,175,80,0.4);
        }
        .btn-new {
            background: linear-gradient(135deg, #00d9ff 0%, #00a8cc 100%);
            color: white;
        }
        .btn-list {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        /* 录音列表 */
        .recordings-view {
            display: none;
            flex: 1;
            flex-direction: column;
        }
        .recordings-view.active {
            display: flex;
        }
        .recordings-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }
        .recordings-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .recording-item {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .recording-item audio {
            flex: 1;
            height: 40px;
        }
        .recording-item .time {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            min-width: 50px;
        }
        .recording-item .delete-btn {
            background: transparent;
            color: #ff6b6b;
            padding: 8px;
            font-size: 1.2rem;
        }
        
        /* 加载动画 */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }
        .loading.active {
            display: flex;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            color: white;
        }
    </style>
</head>
<body>
    <!-- 步骤1: 输入名字 -->
    <div class="step active" id="step1">
        <div class="step-icon">👋</div>
        <div class="step-title">你好！</div>
        <div class="step-desc">请告诉我你的名字</div>
        <div class="input-box">
            <input type="text" id="userName" placeholder="请输入名字" maxlength="20" inputmode="text">
        </div>
        <button class="btn btn-primary" onclick="goToStep2()">下一步</button>
    </div>
    
    <!-- 步骤2: 录音界面 -->
    <div class="step" id="step2">
        <div class="user-header">
            <div class="user-name">👤 <span id="displayName"></span></div>
        </div>
        
        <div class="recorder-area">
            <!-- 当前录音段信息 -->
            <div class="current-session">
                <div class="session-info">
                    <span class="session-label">当前录音</span>
                    <span class="segments-count" id="segmentsCount">0 段</span>
                </div>
                <div class="timer" id="timer">00:00</div>
            </div>
            
            <div class="step-icon">🎙️</div>
            <div class="status-text" id="statusText">点击开始录音</div>
            
            <div class="mic-button" id="micButton" onclick="toggleRecording()">
                <svg viewBox="0 0 24 24" id="micIcon">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </div>
            
            <!-- 控制按钮 -->
            <div class="record-controls">
                <button class="btn btn-record" id="recordBtn" onclick="toggleRecording()">
                    <span id="recordBtnText">开始录音</span>
                </button>
                <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()" disabled>
                    <span id="pauseBtnText">暂停</span>
                </button>
                <button class="btn btn-save" id="saveBtn" onclick="saveCurrentSession()" disabled>
                    保存录音
                </button>
            </div>
        </div>
        
        <button class="btn btn-secondary" onclick="showRecordings()">📋 查看录音列表</button>
    </div>
    
    <!-- 步骤3: 录音完成 -->
    <div class="step" id="step3">
        <div class="step-icon">✅</div>
        <div class="step-title">录音保存成功！</div>
        
        <div class="complete-stats">
            <div class="stat-item">
                <span>录音段数</span>
                <span id="finalSegments">0</span>
            </div>
            <div class="stat-item">
                <span>总时长</span>
                <span id="finalDuration">00:00</span>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="btn btn-share" onclick="shareRecordings()">📤 分享录音</button>
            <button class="btn btn-new" onclick="goToStep2()">🎙️ 继续录音</button>
            <button class="btn btn-list" onclick="showRecordings()">📋 查看全部录音</button>
        </div>
    </div>
    
    <!-- 录音列表 -->
    <div class="recordings-view" id="recordingsView">
        <div class="recordings-header">
            <div>
                <button class="btn btn-text" onclick="backToRecord()">← 返回</button>
            </div>
            <div style="font-weight: 600;">录音列表 (<span id="totalCount">0</span>)</div>
            <div>
                <button class="btn btn-text" onclick="clearAll()">清空</button>
            </div>
        </div>
        <div class="recordings-list" id="recordingsList"></div>
    </div>
    
    <!-- 加载中 -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">处理中...</div>
    </div>
    
    <script>
        // 生成唯一用户ID
        function getUserId() {
            let userId = localStorage.getItem('voice_user_id');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('voice_user_id', userId);
            }
            return userId;
        }
        
        function getUserName() {
            return localStorage.getItem('voice_user_name') || '';
        }
        
        function setUserName(name) {
            localStorage.setItem('voice_user_name', name);
        }
        
        // IndexedDB 操作
        let db;
        const DB_NAME = 'VoiceRecorder';
        const STORE_NAME = 'recordings';
        
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        }
        
        function saveRecording(blob, segments) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const record = {
                    id: 'rec_' + Date.now(),
                    blob: blob,
                    segments: segments,
                    createdAt: new Date().toISOString(),
                    userId: getUserId()
                };
                const request = store.add(record);
                request.onsuccess = () => resolve(record);
                request.onerror = () => reject(request.error);
            });
        }
        
        function getAllRecordings() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }
        
        function deleteRecording(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                store.delete(id);
                transaction.oncomplete = () => resolve();
                transaction.onerror = () => reject(transaction.error);
            });
        }
        
        function clearAllRecordings() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                store.clear();
                transaction.oncomplete = () => resolve();
                transaction.onerror = () => reject(transaction.error);
            });
        }
        
        // 录音相关
        let mediaRecorder;
        let mediaStream = null;
        let audioChunks = [];
        let isRecording = false;
        let isPaused = false;
        let startTime;
        let pauseTime = 0;
        let timerInterval;
        
        // 当前会话的录音段
        let currentSegments = [];
        let currentSessionBlobs = [];
        
        async function initRecorder() {
            try {
                // 释放之前的流
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(mediaStream);
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        currentSessionBlobs.push(blob);
                        currentSegments.push({
                            index: currentSegments.length + 1,
                            blob: blob,
                            duration: Math.floor((Date.now() - startTime + pauseTime) / 1000)
                        });
                        audioChunks = [];
                        updateSegmentsCount();
                        document.getElementById('saveBtn').disabled = false;
                    }
                    // 停止后释放麦克风
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(track => track.stop());
                        mediaStream = null;
                    }
                };
            } catch (err) {
                alert('请允许麦克风权限');
                console.error(err);
            }
        }
        
        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
        
        async function startRecording() {
            // 如果没有流，重新初始化
            if (!mediaStream || !mediaRecorder) {
                await initRecorder();
            }
            
            // 重新获取麦克风权限
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(mediaStream);
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        currentSessionBlobs.push(blob);
                        currentSegments.push({
                            index: currentSegments.length + 1,
                            blob: blob,
                            duration: Math.floor((Date.now() - startTime + pauseTime) / 1000)
                        });
                        audioChunks = [];
                        updateSegmentsCount();
                        document.getElementById('saveBtn').disabled = false;
                    }
                    // 停止后释放麦克风
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(track => track.stop());
                        mediaStream = null;
                    }
                };
            } catch (err) {
                console.error(err);
                return;
            }
            
            audioChunks = [];
            mediaRecorder.start(100);
            isRecording = true;
            isPaused = false;
            startTime = Date.now();
            pauseTime = 0;
            
            document.getElementById('micButton').classList.add('recording');
            document.getElementById('micIcon').innerHTML = '<rect x="6" y="6" width="12" height="12" fill="white"/>';
            document.getElementById('statusText').textContent = '正在录音...';
            document.getElementById('statusText').classList.add('recording');
            
            document.getElementById('recordBtnText').textContent = '停止';
            document.getElementById('pauseBtn').disabled = false;
            
            timerInterval = setInterval(updateTimer, 100);
        }
        
        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            
            document.getElementById('micButton').classList.remove('recording');
            document.getElementById('micIcon').innerHTML = '<path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>';
            document.getElementById('statusText').textContent = '点击开始新录音';
            document.getElementById('statusText').classList.remove('recording');
            
            document.getElementById('recordBtnText').textContent = '开始录音';
            document.getElementById('pauseBtn').disabled = true;
            
            clearInterval(timerInterval);
            updateTimer();
            
            // 释放麦克风焦点
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
                mediaRecorder = null;
            }
        }
        
        async function togglePause() {
            if (isPaused) {
                // 恢复录音 - 重新获取麦克风
                try {
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(track => track.stop());
                    }
                    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(mediaStream);
                    
                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            audioChunks.push(event.data);
                        }
                    };
                    
                    mediaRecorder.onstop = () => {
                        if (audioChunks.length > 0) {
                            const blob = new Blob(audioChunks, { type: 'audio/webm' });
                            currentSessionBlobs.push(blob);
                            currentSegments.push({
                                index: currentSegments.length + 1,
                                blob: blob,
                                duration: Math.floor((Date.now() - startTime + pauseTime) / 1000)
                            });
                            audioChunks = [];
                            updateSegmentsCount();
                            document.getElementById('saveBtn').disabled = false;
                        }
                        if (mediaStream) {
                            mediaStream.getTracks().forEach(track => track.stop());
                            mediaStream = null;
                        }
                    };
                    
                    mediaRecorder.start(100);
                    isPaused = false;
                    isRecording = true;
                    startTime = Date.now();
                    
                    document.getElementById('pauseBtnText').textContent = '暂停';
                    document.getElementById('statusText').textContent = '正在录音...';
                    document.getElementById('micButton').classList.add('recording');
                    document.getElementById('recordBtnText').textContent = '停止';
                    
                    timerInterval = setInterval(updateTimer, 100);
                } catch(e) {
                    console.error(e);
                    alert('无法重新获取麦克风');
                }
            } else {
                // 暂停 - 停止并释放
                mediaRecorder.stop();
                isPaused = true;
                isRecording = false;
                
                clearInterval(timerInterval);
                
                document.getElementById('pauseBtnText').textContent = '继续';
                document.getElementById('statusText').textContent = '已暂停';
                document.getElementById('micButton').classList.remove('recording');
                
                // 释放麦克风
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                    mediaStream = null;
                    mediaRecorder = null;
                }
            }
        }
        
        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime + pauseTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${minutes}:${seconds}`;
        }
        
        function updateSegmentsCount() {
            document.getElementById('segmentsCount').textContent = currentSegments.length + ' 段';
        }
        
        async function saveCurrentSession() {
            if (currentSessionBlobs.length === 0) {
                alert('没有录音可保存');
                return;
            }
            
            showLoading('保存中...');
            
            // 合并所有录音段
            const combinedBlob = new Blob(currentSessionBlobs, { type: 'audio/webm' });
            
            // 保存到 IndexedDB
            await saveRecording(combinedBlob, currentSegments.length);
            
            // 计算总时长
            const totalDuration = currentSegments.reduce((sum, seg) => sum + seg.duration, 0);
            const minutes = Math.floor(totalDuration / 60).toString().padStart(2, '0');
            const seconds = (totalDuration % 60).toString().padStart(2, '0');
            
            document.getElementById('finalSegments').textContent = currentSegments.length + ' 段';
            document.getElementById('finalDuration').textContent = `${minutes}:${seconds}`;
            
            // 重置当前会话
            currentSegments = [];
            currentSessionBlobs = [];
            updateSegmentsCount();
            document.getElementById('saveBtn').disabled = true;
            document.getElementById('timer').textContent = '00:00';
            
            hideLoading();
            
            // 跳转完成界面
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
        }
        
        // 界面跳转
        function goToStep2() {
            const name = document.getElementById('userName').value.trim();
            if (!name) {
                alert('请输入名字');
                return;
            }
            setUserName(name);
            document.getElementById('displayName').textContent = name;
            
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            
            // 重置当前会话
            currentSegments = [];
            currentSessionBlobs = [];
            updateSegmentsCount();
            
            initRecorder();
        }
        
        function resetUser() {
            localStorage.removeItem('voice_user_name');
            document.getElementById('userName').value = '';
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.add('active');
            document.getElementById('timer').textContent = '00:00';
        }
        
        async function showRecordings() {
            const recordings = await getAllRecordings();
            
            document.getElementById('totalCount').textContent = recordings.length;
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.remove('active');
            document.getElementById('recordingsView').classList.add('active');
            
            const list = document.getElementById('recordingsList');
            list.innerHTML = '';
            
            recordings.reverse().forEach(rec => {
                const url = URL.createObjectURL(rec.blob);
                const date = new Date(rec.createdAt);
                const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')}`;
                
                const item = document.createElement('div');
                item.className = 'recording-item';
                item.innerHTML = `
                    <span class="time">${timeStr}</span>
                    <audio controls src="${url}"></audio>
                    <button class="delete-btn" onclick="deleteRec('${rec.id}', this)">🗑️</button>
                `;
                list.appendChild(item);
            });
        }
        
        function backToRecord() {
            document.getElementById('recordingsView').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }
        
        async function deleteRec(id, btn) {
            await deleteRecording(id);
            btn.parentElement.remove();
            const count = document.getElementById('recordingsList').children.length;
            document.getElementById('totalCount').textContent = count;
        }
        
        async function clearAll() {
            if (confirm('确定要清空所有录音吗？')) {
                await clearAllRecordings();
                document.getElementById('recordingsList').innerHTML = '';
                document.getElementById('totalCount').textContent = '0';
            }
        }
        
        // 分享功能
        async function shareRecordings() {
            const recordings = await getAllRecordings();
            if (recordings.length === 0) {
                alert('没有录音可分享');
                return;
            }
            
            showLoading('正在打包...');
            
            try {
                const zip = new JSZip();
                const userName = getUserName();
                
                for (let i = 0; i < recordings.length; i++) {
                    const rec = recordings[i];
                    const date = new Date(rec.createdAt);
                    const filename = `${userName}_${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate()}_${date.getHours()}${date.getMinutes()}${date.getSeconds()}.webm`;
                    zip.file(filename, rec.blob);
                }
                
                const info = `语音录制器导出\n用户名: ${userName}\n录音数量: ${recordings.length}\n导出时间: ${new Date().toLocaleString()}`;
                zip.file('说明.txt', info);
                
                const content = await zip.generateAsync({ type: 'blob' });
                
                const file = new File([content], `${userName}_录音_${recordings.length}个.zip`, {
                    type: 'application/zip'
                });
                
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: '语音录音',
                        text: `这是 ${userName} 的 ${recordings.length} 条录音`
                    });
                } else if (navigator.share) {
                    const url = URL.createObjectURL(content);
                    await navigator.share({
                        title: '语音录音',
                        text: `这是 ${userName} 的 ${recordings.length} 条录音`,
                        url: url
                    });
                } else {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(content);
                    a.download = `${userName}_录音_${recordings.length}个.zip`;
                    a.click();
                    alert('已下载 ZIP 文件');
                }
            } catch (err) {
                console.error(err);
                alert('分享失败，请重试');
            }
            
            hideLoading();
        }
        
        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loading').classList.add('active');
        }
        
        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }
        
        // 初始化
        async function init() {
            getUserId();
            await initDB();
            
            const name = getUserName();
            if (name) {
                document.getElementById('displayName').textContent = name;
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                initRecorder();
            }
        }
        
        document.getElementById('userName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') goToStep2();
        });
        
        // 监听页面可见性变化（切换APP时保存录音）
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'hidden' && isRecording) {
                // 用户切换到其他APP，停止并保存当前录音
                console.log('App backgrounded, saving recording...');
                stopRecording();
                // 自动保存
                if (currentSessionBlobs.length > 0) {
                    await saveCurrentSession();
                }
                alert('已自动保存录音');
            }
        });
        
        init();
    </script>
</body>
</html>
