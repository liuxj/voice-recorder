<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>语音录制器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
        }
        
        /* 引导步骤 */
        .step {
            display: none;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        .step.active {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .step-icon {
            font-size: 4rem;
            margin-bottom: 30px;
        }
        .step-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .step-desc {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 40px;
        }
        
        /* 输入框 */
        .input-box {
            width: 100%;
            max-width: 300px;
        }
        .input-box input {
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: 16px;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.95);
            text-align: center;
            outline: none;
        }
        .input-box input:focus {
            box-shadow: 0 0 0 3px rgba(0,217,255,0.5);
        }
        
        /* 按钮 */
        .btn {
            padding: 18px 48px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d9ff 0%, #00a8cc 100%);
            color: white;
            box-shadow: 0 8px 30px rgba(0,217,255,0.4);
        }
        .btn-primary:active {
            transform: scale(0.95);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        /* 录音界面 */
        .recorder-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .user-header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-name {
            background: rgba(0,217,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .btn-text {
            background: transparent;
            color: #ff6b6b;
            padding: 8px 16px;
            font-size: 0.9rem;
        }
        
        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(233,69,96,0.5);
            transition: all 0.3s ease;
            margin: 30px 0;
        }
        .mic-button:active {
            transform: scale(0.9);
        }
        .mic-button.recording {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 40px rgba(233,69,96,0.5); }
            50% { transform: scale(1.1); box-shadow: 0 15px 60px rgba(233,69,96,0.8); }
        }
        .mic-button svg {
            width: 50px;
            height: 50px;
            fill: white;
        }
        
        .timer {
            font-size: 3rem;
            font-weight: bold;
            font-family: 'SF Mono', monospace;
            margin: 20px 0;
        }
        
        .status-text {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
        }
        .status-text.recording {
            color: #e94560;
        }
        
        /* 完成界面 */
        .complete-stats {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            width: 100%;
            max-width: 320px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 320px;
        }
        
        .btn-share {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            box-shadow: 0 8px 30px rgba(76,175,80,0.4);
        }
        .btn-new {
            background: linear-gradient(135deg, #00d9ff 0%, #00a8cc 100%);
            color: white;
        }
        .btn-list {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        /* 录音列表 */
        .recordings-view {
            display: none;
            flex: 1;
            flex-direction: column;
        }
        .recordings-view.active {
            display: flex;
        }
        .recordings-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }
        .recordings-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .recording-item {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .recording-item audio {
            flex: 1;
            height: 40px;
        }
        .recording-item .time {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            min-width: 50px;
        }
        .recording-item .delete-btn {
            background: transparent;
            color: #ff6b6b;
            padding: 8px;
            font-size: 1.2rem;
        }
        
        /* 加载动画 */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }
        .loading.active {
            display: flex;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            color: white;
        }
    </style>
</head>
<body>
    <!-- 步骤1: 输入名字 -->
    <div class="step active" id="step1">
        <div class="step-icon">👋</div>
        <div class="step-title">你好！</div>
        <div class="step-desc">请告诉我你的名字</div>
        <div class="input-box">
            <input type="text" id="userName" placeholder="请输入名字" maxlength="20" inputmode="text">
        </div>
        <button class="btn btn-primary" onclick="goToStep2()">下一步</button>
    </div>
    
    <!-- 步骤2: 开始录音 -->
    <div class="step" id="step2">
        <div class="user-header">
            <div class="user-name">👤 <span id="displayName"></span></div>
            <button class="btn btn-text" onclick="resetUser()">切换用户</button>
        </div>
        <div class="recorder-area">
            <div class="step-icon">🎙️</div>
            <div class="step-title">准备好了吗？</div>
            <div class="status-text" id="statusText">点击开始录音</div>
            
            <div class="mic-button" id="micButton" onclick="toggleRecording()">
                <svg viewBox="0 0 24 24" id="micIcon">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </div>
            
            <div class="timer" id="timer">00:00</div>
        </div>
        <button class="btn btn-secondary" onclick="showRecordings()">📋 查看录音列表</button>
    </div>
    
    <!-- 步骤3: 录音完成 -->
    <div class="step" id="step3">
        <div class="step-icon">✅</div>
        <div class="step-title">录音完成！</div>
        
        <div class="complete-stats">
            <div class="stat-item">
                <span>录音时长</span>
                <span id="finalDuration">00:00</span>
            </div>
            <div class="stat-item">
                <span>文件大小</span>
                <span id="fileSize">0 KB</span>
            </div>
            <div class="stat-item">
                <span>录音编号</span>
                <span id="recordIndex">#1</span>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="btn btn-share" onclick="shareRecordings()">📤 分享录音</button>
            <button class="btn btn-new" onclick="goToStep2()">🎙️ 继续录音</button>
            <button class="btn btn-list" onclick="showRecordings()">📋 查看全部录音</button>
        </div>
    </div>
    
    <!-- 录音列表 -->
    <div class="recordings-view" id="recordingsView">
        <div class="recordings-header">
            <div>
                <button class="btn btn-text" onclick="backToRecord()">← 返回</button>
            </div>
            <div style="font-weight: 600;">录音列表 (<span id="totalCount">0</span>)</div>
            <div>
                <button class="btn btn-text" onclick="clearAll()">清空</button>
            </div>
        </div>
        <div class="recordings-list" id="recordingsList"></div>
    </div>
    
    <!-- 加载中 -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">处理中...</div>
    </div>
    
    <script>
        // 生成唯一用户ID
        function getUserId() {
            let userId = localStorage.getItem('voice_user_id');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('voice_user_id', userId);
            }
            return userId;
        }
        
        // 获取/设置用户名
        function getUserName() {
            return localStorage.getItem('voice_user_name') || '';
        }
        
        function setUserName(name) {
            localStorage.setItem('voice_user_name', name);
        }
        
        // IndexedDB 操作
        let db;
        const DB_NAME = 'VoiceRecorder';
        const STORE_NAME = 'recordings';
        
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        store.createIndex('createdAt', 'createdAt', { unique: false });
                    }
                };
            });
        }
        
        function saveRecording(blob) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const record = {
                    id: 'rec_' + Date.now(),
                    blob: blob,
                    createdAt: new Date().toISOString(),
                    userId: getUserId()
                };
                const request = store.add(record);
                request.onsuccess = () => resolve(record);
                request.onerror = () => reject(request.error);
            });
        }
        
        function getAllRecordings() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }
        
        function deleteRecording(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }
        
        function clearAllRecordings() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.clear();
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }
        
        // 录音相关
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let startTime;
        let timerInterval;
        let currentBlob;
        
        async function initRecorder() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    currentBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioChunks = [];
                    
                    // 保存到 IndexedDB
                    await saveRecording(currentBlob);
                    
                    // 显示完成界面
                    showComplete();
                };
            } catch (err) {
                alert('请允许麦克风权限');
                console.error(err);
            }
        }
        
        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
        
        function startRecording() {
            if (!mediaRecorder) {
                initRecorder().then(() => startRecording());
                return;
            }
            
            mediaRecorder.start();
            isRecording = true;
            startTime = Date.now();
            
            document.getElementById('micButton').classList.add('recording');
            document.getElementById('micIcon').innerHTML = '<rect x="6" y="6" width="12" height="12" fill="white"/>';
            document.getElementById('statusText').textContent = '正在录音...';
            document.getElementById('statusText').classList.add('recording');
            
            timerInterval = setInterval(updateTimer, 100);
        }
        
        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            
            document.getElementById('micButton').classList.remove('recording');
            document.getElementById('micIcon').innerHTML = '<path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>';
            document.getElementById('statusText').textContent = '录音完成';
            document.getElementById('statusText').classList.remove('recording');
            
            clearInterval(timerInterval);
        }
        
        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${minutes}:${seconds}`;
        }
        
        // 界面跳转
        function goToStep2() {
            const name = document.getElementById('userName').value.trim();
            if (!name) {
                alert('请输入名字');
                return;
            }
            setUserName(name);
            document.getElementById('displayName').textContent = name;
            
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            
            initRecorder();
        }
        
        function resetUser() {
            localStorage.removeItem('voice_user_name');
            document.getElementById('userName').value = '';
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.add('active');
            document.getElementById('timer').textContent = '00:00';
        }
        
        async function showComplete() {
            const recordings = await getAllRecordings();
            const index = recordings.length;
            
            // 计算时长
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            
            // 文件大小
            const sizeKB = Math.round(currentBlob.size / 1024);
            const sizeStr = sizeKB > 1024 ? (sizeKB / 1024).toFixed(1) + ' MB' : sizeKB + ' KB';
            
            document.getElementById('finalDuration').textContent = `${minutes}:${seconds}`;
            document.getElementById('fileSize').textContent = sizeStr;
            document.getElementById('recordIndex').textContent = '#' + index;
            
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
            
            document.getElementById('timer').textContent = '00:00';
        }
        
        async function showRecordings() {
            const recordings = await getAllRecordings();
            const userName = getUserName();
            
            document.getElementById('totalCount').textContent = recordings.length;
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.remove('active');
            document.getElementById('recordingsView').classList.add('active');
            
            const list = document.getElementById('recordingsList');
            list.innerHTML = '';
            
            // 按时间倒序
            recordings.reverse().forEach(rec => {
                const url = URL.createObjectURL(rec.blob);
                const date = new Date(rec.createdAt);
                const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')}`;
                
                const item = document.createElement('div');
                item.className = 'recording-item';
                item.innerHTML = `
                    <span class="time">${timeStr}</span>
                    <audio controls src="${url}"></audio>
                    <button class="delete-btn" onclick="deleteRec('${rec.id}', this)">🗑️</button>
                `;
                list.appendChild(item);
            });
        }
        
        function backToRecord() {
            document.getElementById('recordingsView').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }
        
        async function deleteRec(id, btn) {
            await deleteRecording(id);
            btn.parentElement.remove();
            const count = document.getElementById('recordingsList').children.length;
            document.getElementById('totalCount').textContent = count;
        }
        
        async function clearAll() {
            if (confirm('确定要清空所有录音吗？')) {
                await clearAllRecordings();
                document.getElementById('recordingsList').innerHTML = '';
                document.getElementById('totalCount').textContent = '0';
            }
        }
        
        // 分享功能
        async function shareRecordings() {
            const recordings = await getAllRecordings();
            if (recordings.length === 0) {
                alert('没有录音可分享');
                return;
            }
            
            showLoading('正在打包...');
            
            try {
                const zip = new JSZip();
                const userName = getUserName();
                
                // 添加录音文件
                for (let i = 0; i < recordings.length; i++) {
                    const rec = recordings[i];
                    const date = new Date(rec.createdAt);
                    const filename = `${userName}_${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate()}_${date.getHours()}${date.getMinutes()}${date.getSeconds()}.webm`;
                    zip.file(filename, rec.blob);
                }
                
                // 添加说明文件
                const info = `语音录制器导出\n用户名: ${userName}\n录音数量: ${recordings.length}\n导出时间: ${new Date().toLocaleString()}`;
                zip.file('说明.txt', info);
                
                const content = await zip.generateAsync({ type: 'blob' });
                
                // 使用 Web Share API
                const file = new File([content], `${userName}_录音_${recordings.length}个.zip`, {
                    type: 'application/zip'
                });
                
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: '语音录音',
                        text: `这是 ${userName} 的 ${recordings.length} 条录音`
                    });
                } else if (navigator.share) {
                    // 不支持文件分享，尝试普通分享
                    const url = URL.createObjectURL(content);
                    await navigator.share({
                        title: '语音录音',
                        text: `这是 ${userName} 的 ${recordings.length} 条录音`,
                        url: url
                    });
                } else {
                    // 不支持分享，下载
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(content);
                    a.download = `${userName}_录音_${recordings.length}个.zip`;
                    a.click();
                    alert('已下载 ZIP 文件');
                }
            } catch (err) {
                console.error(err);
                alert('分享失败，请重试');
            }
            
            hideLoading();
        }
        
        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loading').classList.add('active');
        }
        
        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }
        
        // 初始化
        async function init() {
            getUserId();
            await initDB();
            
            const name = getUserName();
            if (name) {
                document.getElementById('displayName').textContent = name;
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                initRecorder();
            }
        }
        
        // 回车下一步
        document.getElementById('userName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') goToStep2();
        });
        
        init();
    </script>
</body>
</html>
